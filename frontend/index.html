<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedTeamKa - Enterprise Red Team Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="login-container">
            <div class="login-box">
                <div class="login-header">
                    <i class="fas fa-shield-haltered"></i>
                    <h1>RedTeamKa</h1>
                    <p>Enterprise Red Team Platform</p>
                </div>
                <form id="login-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-login">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
                <div class="demo-creds">
                    <p><strong>Demo Credentials:</strong></p>
                    <p>🔴 Pentester: pentest / RedTeamKa@2024</p>
                    <p>🔵 Client: client / Client@2024</p>
                </div>
            </div>
        </div>

        <!-- Main Dashboard -->
        <div id="dashboard" style="display: none;">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="logo">
                    <i class="fas fa-shield-haltered"></i>
                    <span>RedTeamKa</span>
                </div>
                <nav class="nav-menu">
                    <a href="#" class="nav-item active" data-view="dashboard">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="#" class="nav-item" data-view="scan">
                        <i class="fas fa-search"></i>
                        <span>New Scan</span>
                    </a>
                    <a href="#" class="nav-item" data-view="scans">
                        <i class="fas fa-history"></i>
                        <span>Scan History</span>
                    </a>
                    <a href="#" class="nav-item pentest-only" data-view="exploits">
                        <i class="fas fa-bolt"></i>
                        <span>Exploits</span>
                    </a>
                    <a href="#" class="nav-item" data-view="findings">
                        <i class="fas fa-bug"></i>
                        <span>Findings</span>
                    </a>
                    <a href="#" class="nav-item" data-view="reports">
                        <i class="fas fa-file-alt"></i>
                        <span>Reports</span>
                    </a>
                    <a href="#" class="nav-item pentest-only" data-view="admin">
                        <i class="fas fa-cog"></i>
                        <span>Admin</span>
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-info">
                        <i class="fas fa-user-circle"></i>
                        <span id="user-name"></span>
                        <span class="role-badge" id="user-role"></span>
                    </div>
                    <button id="logout-btn" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div class="content-area" id="content-area">
                    <!-- Dynamic content loaded here -->
                </div>
            </main>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/reports.js"></script>
</body>
</html>
