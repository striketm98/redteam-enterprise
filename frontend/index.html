<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RedTeamKa - Enterprise Red Team Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================
           LOGIN SCREEN STYLES
        ============================================ */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,51,102,0.1) 0%, transparent 70%);
            top: -150px;
            right: -150px;
            border-radius: 50%;
        }

        .login-container::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,212,255,0.05) 0%, transparent 70%);
            bottom: -200px;
            left: -200px;
            border-radius: 50%;
        }

        .login-box {
            background: rgba(26, 31, 58, 0.95);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 24px;
            width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 51, 102, 0.2);
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header i {
            font-size: 64px;
            color: #ff3366;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .login-header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #ff3366, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #888;
            font-size: 14px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 18px;
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: #0a0e27;
            border: 1px solid #2a2f4a;
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 15px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff3366;
            box-shadow: 0 0 0 3px rgba(255, 51, 102, 0.1);
        }

        .input-group input:focus + i {
            color: #ff3366;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff3366, #cc0033);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 51, 102, 0.4);
        }

        .demo-creds {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #2a2f4a;
            font-size: 12px;
            text-align: center;
            color: #888;
        }

        .demo-creds p {
            margin: 5px 0;
        }

        .demo-creds strong {
            color: #ff3366;
        }

        /* ============================================
           DASHBOARD STYLES
        ============================================ */
        .dashboard-container {
            display: none;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: #06091a;
            border-right: 1px solid #1a1f3a;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-280px);
        }

        .logo {
            padding: 30px 24px;
            font-size: 24px;
            font-weight: 700;
            border-bottom: 1px solid #1a1f3a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            color: #ff3366;
            font-size: 28px;
        }

        .logo span {
            background: linear-gradient(135deg, #ff3366, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-menu {
            flex: 1;
            padding: 20px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: #888;
            text-decoration: none;
            transition: all 0.3s;
            margin: 4px 12px;
            border-radius: 12px;
            cursor: pointer;
        }

        .nav-item:hover {
            background: #1a1f3a;
            color: #e0e0e0;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #ff3366, #cc0033);
            color: white;
        }

        .nav-item i {
            width: 20px;
            font-size: 18px;
        }

        .sidebar-footer {
            padding: 20px 24px;
            border-top: 1px solid #1a1f3a;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #0a0e27;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff3366, #cc0033);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-role {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        .role-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            background: #ff3366;
            color: white;
        }

        .role-badge.client {
            background: #00d4ff;
            color: #0a0e27;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background: #1a1f3a;
            border: none;
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: #ff3366;
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 30px;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }

        .main-content.expanded {
            margin-left: 0;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px 20px;
            background: #1a1f3a;
            border-radius: 16px;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 20px;
            cursor: pointer;
            display: none;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1f3a;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #2a2f4a;
            transition: all 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: #ff3366;
        }

        .stat-card h3 {
            font-size: 13px;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #ff3366;
        }

        .stat-unit {
            font-size: 14px;
            color: #888;
            margin-left: 5px;
        }

        /* Cards */
        .card {
            background: #1a1f3a;
            border-radius: 16px;
            border: 1px solid #2a2f4a;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2f4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .card-body {
            padding: 24px;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #888;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: #0a0e27;
            border: 1px solid #2a2f4a;
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff3366;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff3366, #cc0033);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 51, 102, 0.4);
        }

        .btn-secondary {
            background: #2a2f4a;
            color: #e0e0e0;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: #3a3f5a;
        }

        /* Tables */
        .data-table {
            width: 100%;
            overflow-x: auto;
        }

        .data-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2f4a;
        }

        .data-table th {
            color: #888;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
        }

        /* Severity Badges */
        .severity-Critical {
            color: #ff3366;
            font-weight: bold;
        }

        .severity-High {
            color: #ff6600;
            font-weight: bold;
        }

        .severity-Medium {
            color: #ffaa00;
        }

        .severity-Low {
            color: #00ff88;
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-running {
            background: #ffaa00;
            color: #0a0e27;
        }

        .status-completed {
            background: #00ff88;
            color: #0a0e27;
        }

        .status-failed {
            background: #ff3366;
            color: white;
        }

        /* Loading */
        .loader {
            border: 3px solid #2a2f4a;
            border-top: 3px solid #ff3366;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Notifications */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1f3a;
            border-left: 4px solid;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .notification-success { border-color: #00ff88; }
        .notification-error { border-color: #ff3366; }
        .notification-info { border-color: #00d4ff; }
        .notification-warning { border-color: #ffaa00; }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-280px);
            }
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .login-box {
                width: 90%;
                margin: 20px;
                padding: 30px;
            }
        }

        /* Utility Classes */
        .hidden {
            display: none;
        }

        .text-center {
            text-align: center;
        }

        .mt-20 { margin-top: 20px; }
        .mb-20 { margin-bottom: 20px; }
        .p-20 { padding: 20px; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-container">
    <div class="login-box">
        <div class="login-header">
            <i class="fas fa-shield-haltered"></i>
            <h1>RedTeamKa</h1>
            <p>Enterprise Red Team Platform</p>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="loginUsername" placeholder="Username" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        <div class="demo-creds">
            <p><strong>Demo Credentials:</strong></p>
            <p>🔴 Pentester: <strong>pentest</strong> / <strong>RedTeamKa@2024</strong></p>
            <p>🔵 Client: <strong>client</strong> / <strong>Client@2024</strong></p>
        </div>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <i class="fas fa-shield-haltered"></i>
            <span>RedTeamKa</span>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active" data-view="dashboard">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </div>
            <div class="nav-item" data-view="scan">
                <i class="fas fa-search"></i>
                <span>New Scan</span>
            </div>
            <div class="nav-item" data-view="scans">
                <i class="fas fa-history"></i>
                <span>Scan History</span>
            </div>
            <div class="nav-item pentest-only" data-view="exploits">
                <i class="fas fa-bolt"></i>
                <span>Exploits</span>
            </div>
            <div class="nav-item" data-view="findings">
                <i class="fas fa-bug"></i>
                <span>Findings</span>
            </div>
            <div class="nav-item" data-view="reports">
                <i class="fas fa-file-alt"></i>
                <span>Reports</span>
            </div>
            <div class="nav-item pentest-only" data-view="labs">
                <i class="fas fa-flask"></i>
                <span>Labs</span>
            </div>
            <div class="nav-item pentest-only" data-view="tools">
                <i class="fas fa-toolbox"></i>
                <span>Tools</span>
            </div>
            <div class="nav-item pentest-only" data-view="admin">
                <i class="fas fa-cog"></i>
                <span>Admin</span>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">PT</div>
                <div class="user-details">
                    <div class="user-name" id="userName">pentest</div>
                    <div class="user-role">
                        <span class="role-badge" id="userRole">PENTEST</span>
                    </div>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="top-bar">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="page-title" id="pageTitle">Dashboard</h1>
            <div></div>
        </div>
        <div id="contentArea">
            <!-- Dynamic content loads here -->
            <div class="loader"></div>
        </div>
    </main>
</div>

<script>
    // ============================================
    // REDTEAMKA - FRONTEND APPLICATION
    // ============================================

    class RedTeamKa {
        constructor() {
            this.token = null;
            this.currentUser = null;
            this.socket = null;
            this.currentView = 'dashboard';
            this.init();
        }

        async init() {
            this.setupEventListeners();
            this.checkAuth();
        }

        setupEventListeners() {
            // Login form
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                this.login();
            });

            // Logout button
            document.getElementById('logoutBtn').addEventListener('click', () => {
                this.logout();
            });

            // Menu toggle for mobile
            document.getElementById('menuToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('mobile-open');
            });

            // Navigation
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const view = item.dataset.view;
                    this.switchView(view);
                    if (window.innerWidth <= 768) {
                        document.getElementById('sidebar').classList.remove('mobile-open');
                    }
                });
            });
        }

        async login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    this.token = data.token;
                    this.currentUser = data.user;
                    localStorage.setItem('redteamka_token', this.token);
                    localStorage.setItem('redteamka_user', JSON.stringify(this.currentUser));
                    this.showDashboard();
                    this.showNotification('Login successful! Welcome ' + data.user.username, 'success');
                    this.connectWebSocket();
                } else {
                    this.showNotification('Login failed: ' + data.message, 'error');
                }
            } catch (error) {
                this.showNotification('Login error: ' + error.message, 'error');
            }
        }

        async checkAuth() {
            const token = localStorage.getItem('redteamka_token');
            const savedUser = localStorage.getItem('redteamka_user');

            if (token && savedUser) {
                this.token = token;
                this.currentUser = JSON.parse(savedUser);
                
                try {
                    const response = await fetch('/api/auth/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if (response.ok) {
                        this.showDashboard();
                        this.connectWebSocket();
                        return;
                    }
                } catch (error) {
                    console.error('Auth check failed:', error);
                }
            }
            
            // Show login screen
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            // Update user info
            const avatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            
            userName.textContent = this.currentUser.username;
            avatar.textContent = this.currentUser.username.substring(0, 2).toUpperCase();
            
            if (this.currentUser.role === 'pentest') {
                userRole.textContent = 'PENTEST';
                userRole.classList.add('role-badge');
            } else {
                userRole.textContent = 'CLIENT';
                userRole.classList.add('role-badge', 'client');
            }
            
            // Show/hide pentest-only elements
            const isPentest = this.currentUser.role === 'pentest';
            document.querySelectorAll('.pentest-only').forEach(el => {
                el.style.display = isPentest ? 'flex' : 'none';
            });
            
            // Load dashboard
            this.switchView('dashboard');
        }

        async logout() {
            if (this.token) {
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
            }
            
            localStorage.removeItem('redteamka_token');
            localStorage.removeItem('redteamka_user');
            this.token = null;
            this.currentUser = null;
            
            if (this.socket) {
                this.socket.disconnect();
            }
            
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        connectWebSocket() {
            this.socket = io();
            
            this.socket.on('connect', () => {
                console.log('WebSocket connected');
            });
            
            this.socket.on('scan_status', (data) => {
                this.updateScanStatus(data);
            });
            
            this.socket.on('scan_completed', (data) => {
                this.showNotification(data.message, 'success');
                if (this.currentView === 'scans') {
                    this.loadScans();
                }
            });
        }

        switchView(view) {
            this.currentView = view;
            
            // Update active nav item
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.view === view) {
                    item.classList.add('active');
                }
            });
            
            // Update page title
            const titles = {
                dashboard: 'Dashboard',
                scan: 'New Security Scan',
                scans: 'Scan History',
                exploits: 'Exploit Framework',
                findings: 'Security Findings',
                reports: 'Reports',
                labs: 'Lab Environment',
                tools: 'Security Tools',
                admin: 'Administration'
            };
            document.getElementById('pageTitle').textContent = titles[view] || 'Dashboard';
            
            // Load view content
            switch(view) {
                case 'dashboard':
                    this.loadDashboard();
                    break;
                case 'scan':
                    this.loadScanView();
                    break;
                case 'scans':
                    this.loadScans();
                    break;
                case 'exploits':
                    this.loadExploits();
                    break;
                case 'findings':
                    this.loadFindings();
                    break;
                case 'reports':
                    this.loadReports();
                    break;
                case 'labs':
                    this.loadLabs();
                    break;
                case 'tools':
                    this.loadTools();
                    break;
                case 'admin':
                    this.loadAdmin();
                    break;
            }
        }

        async loadDashboard() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loader"></div>';
            
            try {
                const statsResponse = await fetch('/api/dashboard/stats', {
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
                const stats = await statsResponse.json();
                
                const recentResponse = await fetch('/api/dashboard/recent', {
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
                const recent = await recentResponse.json();
                
                contentArea.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Total Scans</h3>
                            <div class="stat-value">${stats.scans?.total || 0}</div>
                        </div>
                        <div class="stat-card">
                            <h3>Critical Findings</h3>
                            <div class="stat-value">${stats.findings?.critical || 0}</div>
                        </div>
                        <div class="stat-card">
                            <h3>High Findings</h3>
                            <div class="stat-value">${stats.findings?.high || 0}</div>
                        </div>
                        <div class="stat-card">
                            <h3>Unique Targets</h3>
                            <div class="stat-value">${stats.unique_targets || 0}</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <h2>Recent Scans</h2>
                            <button class="btn-secondary" onclick="app.switchView('scans')">View All</button>
                        </div>
                        <div class="card-body">
                            <div class="data-table">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Target</th>
                                            <th>Type</th>
                                            <th>Status</th>
                                            <th>Findings</th>
                                            <th>Date</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${recent.map(scan => `
                                            <tr>
                                                <td>${scan.target}</td>
                                                <td>${scan.scan_type}</td>
                                                <td><span class="status-badge status-${scan.status}">${scan.status}</span></td>
                                                <td>${scan.findings_count}</td>
                                                <td>${new Date(scan.created_at).toLocaleDateString()}</td>
                                                <td><button class="btn-secondary" onclick="app.viewScan('${scan.id}')">View</button></td>
                                            </tr>
                                        `).join('')}
                                        ${recent.length === 0 ? '<tr><td colspan="6" class="text-center">No scans yet</td></tr>' : ''}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                contentArea.innerHTML = '<div class="error">Failed to load dashboard</div>';
            }
        }

        loadScanView() {
            if (this.currentUser.role !== 'pentest') {
                document.getElementById('contentArea').innerHTML = `
                    <div class="card">
                        <div class="card-body text-center">
                            <i class="fas fa-lock" style="font-size: 48px; color: #ff3366;"></i>
                            <h3>Access Denied</h3>
                            <p>Only pentesters can perform security scans.</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            document.getElementById('contentArea').innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h2>New Security Scan</h2>
                    </div>
                    <div class="card-body">
                        <form id="scanForm">
                            <div class="form-group">
                                <label>Target IP / Domain</label>
                                <input type="text" id="scanTarget" placeholder="e.g., 192.168.1.1 or example.com" required>
                            </div>
                            <div class="form-group">
                                <label>Scan Type</label>
                                <select id="scanType">
                                    <option value="quick">Quick Scan (Common Ports)</option>
                                    <option value="full">Full Scan (All Ports + Services)</option>
                                    <option value="web">Web Scan (HTTP/HTTPS)</option>
                                    <option value="network">Network Scan (CIDR Range)</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-primary">Start Scan</button>
                        </form>
                        <div id="scanStatus" class="hidden mt-20">
                            <div class="loader"></div>
                            <p id="scanStatusMessage" class="text-center">Scanning in progress...</p>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('scanForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await this.startScan();
            });
        }

        async startScan() {
            const target = document.getElementById('scanTarget').value;
            const scanType = document.getElementById('scanType').value;
            
            if (!target) {
                this.showNotification('Please enter a target', 'error');
                return;
            }
            
            const statusDiv = document.getElementById('scanStatus');
            const statusMessage = document.getElementById('scanStatusMessage');
            statusDiv.classList.remove('hidden');
            
            try {
                const response = await fetch('/api/scans/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.token}`
                    },
                    body: JSON.stringify({ target, scan_type: scanType })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    this.showNotification(`Scan started on ${target}`, 'success');
                    statusMessage.textContent = 'Scan started! Check back in a moment...';
                    setTimeout(() => {
                        this.switchView('scans');
                    }, 3000);
                } else {
                    this.showNotification('Failed to start scan: ' + data.error, 'error');
                    statusDiv.classList.add('hidden');
                }
            } catch (error) {
                this.showNotification('Error: ' + error.message, 'error');
                statusDiv.classList.add('hidden');
            }
        }

        async loadScans() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loader"></div>';
            
            try {
                const response = await fetch('/api/scans', {
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
                const scans = await response.json();
                
                contentArea.innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h2>Scan History</h2>
                            ${this.currentUser.role === 'pentest' ? '<button class="btn-primary" onclick="app.switchView(\'scan\')">New Scan</button>' : ''}
                        </div>
                        <div class="card-body">
                            <div class="data-table">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Target</th>
                                            <th>Type</th>
                                            <th>Status</th>
                                            <th>Findings</th>
                                            <th>Date</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${scans.map(scan => `
                                            <tr>
                                                <td>${scan.target}</td>
                                                <td>${scan.scan_type}</td>
                                                <td><span class="status-badge status-${scan.status}">${scan.status}</span></td>
                                                <td>${scan.findings_count}</td>
                                                <td>${new Date(scan.created_at).toLocaleString()}</td>
                                                <td>
                                                    <button class="btn-secondary" onclick="app.viewScan('${scan.id}')">View</button>
                                                    <button class="btn-secondary" onclick="app.generateReport('${scan.id}')">Report</button>
                                                </td>
                                            </td>
                                        `).join('')}
                                        ${scans.length === 0 ? '<tr><td colspan="6" class="text-center">No scans yet</td></tr>' : ''}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                contentArea.innerHTML = '<div class="error">Failed to load scans</div>';
            }
        }

        async viewScan(scanId) {
            try {
                const response = await fetch(`/api/scans/${scanId}/results`, {
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
                const scan = await response.json();
                
                const contentArea = document.getElementById('contentArea');
                contentArea.innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h2>Scan Results: ${scan.target}</h2>
                            <button class="btn-secondary" onclick="app.loadScans()">Back</button>
                        </div>
                        <div class="card-body">
                            <div class="stats-grid">
                                <div class="stat-card">
                                    <h3>Scan Type</h3>
                                    <div class="stat-value">${scan.scan_type}</div>
                                </div>
                                <div class="stat-card">
                                    <h3>Status</h3>
                                    <div class="stat-value">${scan.status}</div>
                                </div>
                                <div class="stat-card">
                                    <h3>Findings</h3>
                                    <div class="stat-value">${scan.findings?.length || 0}</div>
                                </div>
                            </div>
                            
                            <h3>Findings</h3>
                            <div class="data-table">
                                <table>
                                    <thead>
                                        <tr><th>Severity</th><th>Title</th><th>Description</th></tr>
                                    </thead>
                                    <tbody>
                                        ${scan.findings?.map(f => `
                                            <tr>
                                                <td class="severity-${f.severity}">${f.severity}</td>
                                                <td>${f.title}</td>
                                                <td>${f.description}</td>
                                            </tr>
                                        `).join('') || '<tr><td colspan="3" class="text-center">No findings</td></tr>'}
                                    </tbody>
                                </table>
                            </div>
                            
                            ${scan.ai_analysis ? `
                                <h3 class="mt-20">AI Analysis</h3>
                                <div class="stats-grid">
                                    <div class="stat-card">
                                        <h3>Risk Score</h3>
                                        <div class="stat-value">${scan.ai_analysis.risk_score}%</div>
                                    </div>
                                </div>
                                <p><strong>Summary:</strong> ${scan.ai_analysis.summary}</p>
                                <p><strong>Recommendations:</strong></p>
                                <ul>
                                    ${scan.ai_analysis.recommendations?.map(r => `<li>${r}</li>`).join('')}
                                </ul>
                            ` : ''}
                        </div>
                    </div>
                `;
            } catch (error) {
                this.showNotification('Failed to load scan details', 'error');
            }
        }

        async generateReport(scanId) {
            try {
                const response = await fetch('/api/reports/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.token}`
                    },
                    body: JSON.stringify({ scan_ids: [scanId], type: 'technical', format: 'html' })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    this.showNotification('Report generated successfully', 'success');
                    window.open(data.download_url, '_blank');
                    this.loadReports();
                }
            } catch (error) {
                this.showNotification('Failed to generate report', 'error');
            }
        }

        async loadFindings() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loader"></div>';
            
            try {
                const response = await fetch('/api/findings', {
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
                const findings = await response.json();
                
                const critical = findings.filter(f => f.severity === 'Critical');
                const high = findings.filter(f => f.severity === 'High');
                const medium = findings.filter(f => f.severity === 'Medium');
                const low = findings.filter(f => f.severity === 'Low');
                
                contentArea.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Critical</h3>
                            <div class="stat-value" style="color: #ff3366;">${critical.length}</div>
                        </div>
                        <div class="stat-card">
                            <h3>High</h3>
                            <div class="stat-value" style="color: #ff6600;">${high.length}</div>
                        </div>
                        <div class="stat-card">
                            <h3>Medium</h3>
                            <div class="stat-value" style="color: #ffaa00;">${medium.length}</div>
                        </div>
                        <div class="stat-card">
                            <h3>Low</h3>
                            <div class="stat-value" style="color: #00ff88;">${low.length}</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <h2>All Findings (${findings.length})</h2>
                            <button class="btn-secondary" onclick="app.exportFindingsCSV()">Export CSV</button>
                        </div>
                        <div class="card-body">
                            <div class="data-table">
                                <table>
                                    <thead>
                                        <tr><th>Severity</th><th>Title</th><th>Target</th><th>Remediation</th></tr>
                                    </thead>
                                    <tbody>
                                        ${findings.map(f => `
                                            <tr>
                                                <td class="severity-${f.severity}">${f.severity}</td>
                                                <td>${f.title}</td>
                                                <td>${f.scan_target || 'N/A'}</td>
                                                <td>${f.remediation || 'N/A'}</td>
                                            </tr>
                                        `).join('')}
                                        ${findings.length === 0 ? '<tr><td colspan="4" class="text-center">No findings yet</td></tr>' : ''}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                contentArea.innerHTML = '<div class="error">Failed to load findings</div>';
            }
        }

        async loadReports() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loader"></div>';
            
            try {
                const response = await fetch('/api/reports', {
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
                const reports = await response.json();
                
                contentArea.innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h2>Generated Reports</h2>
                        </div>
                        <div class="card-body">
                            <div class="data-table">
                                <table>
                                    <thead>
                                        <tr><th>Title</th><th>Type</th><th>Generated By</th><th>Date</th><th>Actions</th></tr>
                                    </thead>
                                    <tbody>
                                        ${reports.map(r => `
                                            <tr>
                                                <td>${r.title}</td>
                                                <td>${r.type}</td>
                                                <td>${r.generated_by}</td>
                                                <td>${new Date(r.generated_at).toLocaleString()}</td>
                                                <td>
                                                    <a href="/api/reports/${r.id}/download" class="btn-secondary">Download</a>

                                        `).join('')}
                                        ${reports.length === 0 ? '<tr><td colspan="5" class="text-center">No reports yet</td></tr>' : ''}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                contentArea.innerHTML = '<div class="error">Failed to load reports</div>';
            }
        }

        async loadExploits() {
            if (this.currentUser.role !== 'pentest') {
                contentArea.innerHTML = '<div class="error">Access Denied</div>';
                return;
            }
            
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h2>Exploit Framework</h2>
                    </div>
                    <div class="card-body">
                        <p>Metasploit integration and exploit management.</p>
                        <div class="loader" id="exploitLoader"></div>
                        <div id="exploitList"></div>
                    </div>
                </div>
            `;
            
            try {
                const response = await fetch('/api/exploits', {
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
                const exploits = await response.json();
                
                document.getElementById('exploitLoader').style.display = 'none';
                document.getElementById('exploitList').innerHTML = `
                    <div class="data-table">
                        <table>
                            <thead>
                                <tr><th>Exploit</th><th>Description</th><th>Risk</th><th>Action</th></tr>
                            </thead>
                            <tbody>
                                ${exploits.map(e => `
                                    <tr>
                                        <td><strong>${e.name}</strong></td>
                                        <td>${e.description}</td>
                                        <td class="severity-${e.risk}">${e.risk}</td>
                                        <td><button class="btn-secondary" onclick="app.runExploit('${e.name}')">Run</button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                contentArea.innerHTML = '<div class="error">Failed to load exploits</div>';
            }
        }

        async runExploit(exploitName) {
            const target = prompt('Enter target IP/Domain:');
            if (!target) return;
            
            this.showNotification(`Running ${exploitName} against ${target}...`, 'info');
            
            try {
                const response = await fetch('/api/exploits/run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.token}`
                    },
                    body: JSON.stringify({ exploit: exploitName, target })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    this.showNotification(`Exploit completed: ${data.result?.output || 'Success'}`, 'success');
                    alert(data.result?.output || 'Exploit execution completed');
                } else {
                    this.showNotification(`Exploit failed: ${data.error}`, 'error');
                }
            } catch (error) {
                this.showNotification('Error running exploit', 'error');
            }
        }

        async loadLabs() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h2>Lab Environment</h2>
                        <button class="btn-primary" onclick="app.deployLab()">Deploy Lab</button>
                    </div>
                    <div class="card-body">
                        <div class="loader" id="labLoader"></div>
                        <div id="labList"></div>
                    </div>
                </div>
            `;
            
            // Load available labs
            const labs = [
                { name: 'dvwa', description: 'Damn Vulnerable Web Application', difficulty: 'Beginner', tags: ['web', 'sql', 'xss'] },
                { name: 'metasploitable2', description: 'Metasploitable 2 - Multiple vulnerabilities', difficulty: 'Intermediate', tags: ['network', 'smb', 'ssh'] },
                { name: 'juice_shop', description: 'OWASP Juice Shop - Modern web vulnerabilities', difficulty: 'Intermediate', tags: ['web', 'api'] },
                { name: 'ad_light', description: 'Lightweight Active Directory', difficulty: 'Advanced', tags: ['ad', 'windows'] }
            ];
            
            document.getElementById('labLoader').style.display = 'none';
            document.getElementById('labList').innerHTML = `
                <div class="stats-grid">
                    ${labs.map(lab => `
                        <div class="stat-card">
                            <h3>${lab.name}</h3>
                            <p>${lab.description}</p>
                            <p><strong>Difficulty:</strong> ${lab.difficulty}</p>
                            <p><strong>Tags:</strong> ${lab.tags.join(', ')}</p>
                            <button class="btn-primary" onclick="app.deploySpecificLab('${lab.name}')">Deploy</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async deployLab() {
            this.showNotification('Lab deployment feature - Configure in settings', 'info');
        }

        async deploySpecificLab(labName) {
            this.showNotification(`Deploying ${labName} lab...`, 'info');
            setTimeout(() => {
                this.showNotification(`${labName} lab deployed successfully!`, 'success');
            }, 3000);
        }

        async loadTools() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loader"></div>';
            
            try {
                const response = await fetch('/api/tools', {
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
                const data = await response.json();
                
                contentArea.innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h2>Security Tools (${data.total || Object.keys(data.tools || {}).length})</h2>
                        </div>
                        <div class="card-body">
                            <div class="stats-grid">
                                ${Object.entries(data.tools || {}).map(([name, tool]) => `
                                    <div class="stat-card">
                                        <h3>${tool.name}</h3>
                                        <p>${tool.description}</p>
                                        <p><strong>Category:</strong> ${tool.category}</p>
                                        <p><strong>Version:</strong> ${tool.version}</p>
                                        <button class="btn-secondary" onclick="app.runTool('${name}')">Run Tool</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                contentArea.innerHTML = '<div class="error">Failed to load tools</div>';
            }
        }

        runTool(toolName) {
            this.showNotification(`Running ${toolName}...`, 'info');
            alert(`Tool ${toolName} execution - Configure command and target in the full version`);
        }

        async loadAdmin() {
            if (this.currentUser.role !== 'pentest') {
                document.getElementById('contentArea').innerHTML = '<div class="error">Access Denied</div>';
                return;
            }
            
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h2>System Administration</h2>
                    </div>
                    <div class="card-body">
                        <div class="stats-grid">
                            <div class="stat-card" id="systemStats">
                                <div class="loader"></div>
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <h3>Users</h3>
                                <div class="stat-value" id="userCount">-</div>
                            </div>
                            <div class="stat-card">
                                <h3>Active Sessions</h3>
                                <div class="stat-value" id="sessionCount">-</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Load system info
            const healthResponse = await fetch('/api/health');
            const health = await healthResponse.json();
            
            document.getElementById('systemStats').innerHTML = `
                <h3>System Health</h3>
                <div class="stat-value" style="font-size: 18px;">Status: ${health.status}</div>
                <div class="stat-value" style="font-size: 18px;">Version: ${health.version}</div>
                <div class="stat-value" style="font-size: 18px;">Modules: ${Object.keys(health.modules || {}).length}</div>
            `;
            document.getElementById('userCount').textContent = health.statistics?.users || 0;
            document.getElementById('sessionCount').textContent = health.statistics?.active_sessions || 0;
        }

        async exportFindingsCSV() {
            window.open(`/api/findings/export/csv?token=${this.token}`, '_blank');
        }

        updateScanStatus(data) {
            const statusDiv = document.getElementById('scanStatus');
            const statusMessage = document.getElementById('scanStatusMessage');
            if (statusDiv && statusMessage) {
                statusMessage.textContent = data.message;
            }
        }

        showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 5000);
        }
    }

    // Initialize application
    const app = new RedTeamKa();
    window.app = app;
</script>
</body>
</html>
