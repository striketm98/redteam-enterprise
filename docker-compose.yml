version: '3.8'

services:
  backend:
    build: ./backend
    container_name: redteam-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./sessions:/app/sessions
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-redteam-secret-key-2024}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASS=${NEO4J_PASS:-password}
    networks:
      - redteam-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: redteam-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - redteam-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5-enterprise
    container_name: redteam-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASS:-password}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - redteam-network
    restart: unless-stopped

networks:
  redteam-network:
    driver: bridge

volumes:
  neo4j-data:
  neo4j-logs: