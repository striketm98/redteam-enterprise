version: '3.9'

services:
  backend:
    build: ./backend
    container_name: redteam-backend
    ports:
      - "8087:8087"
    volumes:
      - ./backend:/app
      - ./sessions:/app/sessions
      - ./reports:/app/reports
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-redteam-secret-key-2024}
      - PORT=8087
    networks:
      - redteam-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: redteam-frontend
    ports:
      - "8087:80"
    depends_on:
      - backend
    networks:
      - redteam-network
    restart: unless-stopped

networks:
  redteam-network:
    driver: bridge
