version: '3.8'

# ============================================
# REDTEAMKA - ENTERPRISE DOCKER COMPOSE
# ============================================

services:
  # ============================================
  # BACKEND API SERVICE
  # ============================================
  backend:
    build: ./backend
    container_name: redteamka-backend
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - SECRET_KEY=${SECRET_KEY:-redteamka-super-secret-key-change-in-production}
      - PYTHONUNBUFFERED=1
      - TZ=UTC
      # Neo4j Configuration
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-RedTeamKa2024!}
      # Redis Configuration
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # Database Configuration
      - DATABASE_URL=${DATABASE_URL:-postgresql://redteamka:RedTeamKa2024!@postgres:5432/redteamka}
    volumes:
      - ./backend:/app
      - ./reports:/app/reports
      - ./sessions:/app/sessions
      - ./uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - redteamka-network
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ============================================
  # FRONTEND NGINX SERVICE
  # ============================================
  frontend:
    build: ./frontend
    container_name: redteamka-frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - redteamka-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ============================================
  # NEO4J GRAPH DATABASE
  # ============================================
  neo4j:
    image: neo4j:5-enterprise
    container_name: redteamka-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-RedTeamKa2024!}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-plugins:/plugins
    networks:
      - redteamka-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-RedTeamKa2024!}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ============================================
  # POSTGRESQL DATABASE
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: redteamka-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=redteamka
      - POSTGRES_USER=redteamka
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-RedTeamKa2024!}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - redteamka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redteamka -d redteamka"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # REDIS CACHE & SESSION STORE
  # ============================================
  redis:
    image: redis:7.2-alpine
    container_name: redteamka-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-RedTeamKa2024!}
    volumes:
      - redis-data:/data
    networks:
      - redteamka-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ============================================
  # OPTIONAL: PgAdmin for Database Management
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: redteamka-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@redteamka.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin123}
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - redteamka-network
    depends_on:
      - postgres
    profiles:
      - dev
      - admin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # ============================================
  # OPTIONAL: Redis Commander for Redis Management
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redteamka-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-RedTeamKa2024!}
    networks:
      - redteamka-network
    depends_on:
      - redis
    profiles:
      - dev
      - admin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # ============================================
  # OPTIONAL: Portainer for Docker Management
  # ============================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: redteamka-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - redteamka-network
    profiles:
      - dev
      - admin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # ============================================
  # OPTIONAL: Elasticsearch for Logging
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: redteamka-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - redteamka-network
    profiles:
      - logging
      - full
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # OPTIONAL: Kibana for Log Visualization
  # ============================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: redteamka-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - redteamka-network
    depends_on:
      - elasticsearch
    profiles:
      - logging
      - full

# ============================================
# NETWORKS
# ============================================
networks:
  redteamka-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    name: redteamka-network

# ============================================
# VOLUMES
# ============================================
volumes:
  neo4j-data:
    name: redteamka-neo4j-data
  neo4j-logs:
    name: redteamka-neo4j-logs
  neo4j-plugins:
    name: redteamka-neo4j-plugins
  postgres-data:
    name: redteamka-postgres-data
  redis-data:
    name: redteamka-redis-data
  pgadmin-data:
    name: redteamka-pgadmin-data
  portainer-data:
    name: redteamka-portainer-data
  elasticsearch-data:
    name: redteamka-elasticsearch-data